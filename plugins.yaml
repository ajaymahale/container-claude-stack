# claude plugin marketplaces + plugins. install-plugins.sh reads this and runs the
# NON-INTERACTIVE claude plugin CLI (claude plugin marketplace add / install).
# Re-run install-plugins.sh after edits — already-added/installed are skipped.
#
# (superwhisper intentionally excluded.)

marketplaces:               # claude plugin marketplace add <source>
  - anthropics/claude-plugins-official   # claude-plugins-official
  - addyosmani/agent-skills              # addy-agent-skills
  - JuliusBrussee/caveman                # caveman
  - Aaronontheweb/dotnet-skills          # dotnet-skills
  - Lum1104/Understand-Anything          # understand-anything
  - mvanhorn/last30days-skill            # last30days-skill
  - DietrichGebert/ponytail              # ponytail
  - thedotmack/claude-mem                # thedotmack

plugins:                    # claude plugin install <plugin>@<marketplace>
  - agent-skills@addy-agent-skills
  - caveman@caveman
  - claude-mem@thedotmack
  - code-review@claude-plugins-official
  - code-simplifier@claude-plugins-official
  - context7@claude-plugins-official
  - csharp-lsp@claude-plugins-official
  - dotnet-skills@dotnet-skills
  - explanatory-output-style@claude-plugins-official
  - frontend-design@claude-plugins-official
  - last30days@last30days-skill
  - mongodb@claude-plugins-official
  - ponytail@ponytail
  - pr-review-toolkit@claude-plugins-official
  - superpowers@claude-plugins-official
  - typescript-lsp@claude-plugins-official
  - understand-anything@understand-anything
