# Source-tracked skill repos. install-claude-config.sh clones each (shallow)
# into ~/.claude/skills/<name>/ and symlinks every sub-skill to the top level
# (how claude discovers them). Updates: git pull in each, or scripts/update-plugins.sh
# (which already auto-pulls everything under ~/.claude/skills).
#
# Authored skills with no upstream live in personal-skills/ (copied, not cloned).

online_skills:
  - name: gstack
    url: https://github.com/garrytan/gstack.git
  - name: matt-pocock
    url: https://github.com/mattpocock/skills.git
  - name: gsd-core
    url: https://github.com/open-gsd/gsd-core.git
  - name: excalidraw-diagram
    url: https://github.com/coleam00/excalidraw-diagram-skill.git
  - name: vercel-skills
    url: https://github.com/vercel-labs/skills.git
  - name: graphify
    url: https://github.com/Graphify-Labs/graphify.git
  - name: taste-skill
    url: https://github.com/Leonxlnx/taste-skill.git
  - name: context7
    url: https://github.com/upstash/context7.git
